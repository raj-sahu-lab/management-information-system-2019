name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./vendor/*" -not -path "./.git/*" | xargs -I {} php -l {} 2>&1 | grep -v "No syntax errors" | head -20; echo "PHP lint done"
